liip_imagine:
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'

    loaders:
        default:
            filesystem:
                data_root: '%kernel.project_dir%/public'

    filter_sets:
        square_thumb:
            quality: 70
            format: jpeg
            filters:
                thumbnail:
                    size: [400, 400]
                    mode: outbound
                    allow_upscale: false
                interlace:
                    mode: line

        lightbox:
            quality: 82
            format: jpeg
            filters:
                thumbnail:
                    size: [1920, 1920]
                    mode: inset
                    allow_upscale: false
                interlace:
                    mode: line
