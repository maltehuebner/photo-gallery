liip_imagine:
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'

    loaders:
        default:
            filesystem:
                data_root: '%kernel.project_dir%/public'

    filter_sets:
        square_thumb:
            quality: 85
            filters:
                thumbnail:
                    size: [400, 400]
                    mode: outbound
                    allow_upscale: false
